<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:title" content="Wonder Sprouts" />
    <meta property="og:description" content="A trivia game for kids 5–8 — made for parent-child bonding. Learn together. Grow together." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script defer src="/Sound.js"></script>
    <script defer src="/Confetti.js"></script>
    <title>Wonder Sprouts</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #efe7d8;
        font-family: Nunito, system-ui, sans-serif;
        color: #8a7c68;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      .splash-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #f0e7d6;
        border-top-color: #e8946a;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .splash-text {
        font-family: 'Baloo 2', sans-serif;
        font-weight: 700;
        font-size: 18px;
        color: #4a3a28;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="splash">
        <div class="splash-spinner"></div>
        <div class="splash-text">Wonder Sprouts</div>
        <div style="font-size: 13px; font-weight: 600;">Loading…</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
